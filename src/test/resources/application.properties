spring.datasource.url=jdbc:h2:mem:user-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop

spring.flyway.enabled=false

# oauth2_authorization is not a JPA entity, so ddl-auto won't create it. Load the canonical schema
# that ships inside spring-security-oauth2-authorization-server rather than a hand-copied one, so
# these tests keep exercising the same shape the V7 migration is adapted from.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/drop-oauth2-authorization.sql,classpath:org/springframework/security/oauth2/server/authorization/oauth2-authorization-schema.sql

gskart.jwt.keystore.path=static/jwtKeys/gskartJwtKeystore.jks
gskart.jwt.keystore.password=Gsk-jwt-key-202404
gskart.jwt.keystore.keyPairAlias=gskartJwtKeyPair

gskart.jwt.access-token.expiry-minutes=15
gskart.jwt.refresh-token.expiry-days=7

spring.security.oauth2.authorizationserver.issuer=http://localhost:4011

gskart.oauth2.portal-client.redirect-uri=http://localhost:3000/callback
gskart.oauth2.test-client.secret=test-client-secret
