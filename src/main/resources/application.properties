server.port=4011

# MySQL db settings
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/gskartUsers
spring.datasource.username=${GSKART_DB_USER}
spring.datasource.password=${GSKART_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# JWT settings
gskart.jwt.access-token.expiry-minutes=20
gskart.jwt.refresh-token.expiry-days=7

# Scheduled cleanup of expired refresh_tokens/blacklisted_tokens rows (daily 03:00 UTC)
gskart.jobs.token-cleanup.cron=0 0 3 * * *

# Pagination guard (D14) — cap page size so a caller can't force an unbounded list response
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Flyway DB Migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.url=${spring.datasource.url}
spring.flyway.password=${spring.datasource.password}
spring.flyway.user=${spring.datasource.username}
spring.flyway.schemas=gskartUsers
spring.flyway.locations=classpath:db/migration/gskartUsersDb

# Admin bootstrap seed (V5) — no default on the password hash so startup fails fast if unset
spring.flyway.placeholders.adminUsername=${GSKART_ADMIN_USERNAME:admin}
spring.flyway.placeholders.adminEmail=${GSKART_ADMIN_EMAIL:admin@gskart.local}
spring.flyway.placeholders.adminPasswordHash=${GSKART_ADMIN_PASSWORD_HASH}

#Spring OAuth Server
logging.level.org.springframework.security=INFO
spring.security.oauth2.authorizationserver.issuer=http://localhost:4011
spring.security.user.name=authservice
spring.security.user.password=${GSKART_SECURITY_USER_PASSWORD}

# GS Kart
gskart.jwt.keystore.path=static/jwtKeys/gskartJwtKeystore.jks
gskart.jwt.keystore.password=${GSKART_JWT_KEYSTORE_PASSWORD}
gskart.jwt.keystore.keyPairAlias=gskartJwtKeyPair
