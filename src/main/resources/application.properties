server.port=4011

# MySQL db settings
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/gskartUsers
spring.datasource.username=${GSKART_DB_USER}
spring.datasource.password=${GSKART_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Token lifetimes. Access tokens are non-revocable, so they sit in the short-lived band RFC 9700
# recommends; refresh tokens are revocable server-side and rotate on every use.
gskart.jwt.access-token.expiry-minutes=15
gskart.jwt.refresh-token.expiry-days=7

# Pagination guard — cap page size so a caller can't force an unbounded list response
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Actuator — health only, for the Docker/compose HEALTHCHECK (explicit despite matching the
# Spring Boot default, so the exposed surface doesn't silently grow if actuator config changes)
management.endpoints.web.exposure.include=health

# Flyway DB Migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.url=${spring.datasource.url}
spring.flyway.password=${spring.datasource.password}
spring.flyway.user=${spring.datasource.username}
spring.flyway.locations=classpath:db/migration/gskartUsersDb

# Admin bootstrap seed (V5) — no default on the password hash so startup fails fast if unset
spring.flyway.placeholders.adminUsername=${GSKART_ADMIN_USERNAME:admin}
spring.flyway.placeholders.adminEmail=${GSKART_ADMIN_EMAIL:admin@gskart.local}
spring.flyway.placeholders.adminPasswordHash=${GSKART_ADMIN_PASSWORD_HASH}

#Spring OAuth Server
logging.level.org.springframework.security=INFO
spring.security.oauth2.authorizationserver.issuer=http://localhost:4011

# Registered clients (in-memory, see AuthorizationServerConfig).
gskart.oauth2.portal-client.redirect-uri=${GSKART_PORTAL_REDIRECT_URI:http://localhost:3000/callback}
# Test client holds the password grant and is only registered under the local/dev profiles.
gskart.oauth2.test-client.secret=${GSKART_TEST_CLIENT_SECRET:}

# GS Kart
gskart.jwt.keystore.path=static/jwtKeys/gskartJwtKeystore.jks
gskart.jwt.keystore.password=${GSKART_JWT_KEYSTORE_PASSWORD}
gskart.jwt.keystore.keyPairAlias=gskartJwtKeyPair
